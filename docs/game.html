<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=egde" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>memolia - lingo memory game</title>
    <link
      rel="icon"
      href="icons/favicon/memolia_tree_thumbnail.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" type="text/css" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js"></script>
  </head>

  <body>
    <div class="background-container">
      <div class="site-wrapper">
        <header>
          <!-- SECTION PAGE LABEL -->
          <section class="section_title-play">
            <container class="container_page-label justify-between">
              <div class="wrapper_h2-text-button h2-padding">
                <h2 id="cate" class="text-title"></h2>
                <div class="wrapper_text-button"></div>
              </div>

              <div class="hit-box justify-end clickable" id="button_trigger">
                <img
               
                  src="./icons/nav/close.svg"
                  alt="opens a dialog box to exit the game"
                />
              </div>
            </container>

            <!-- SECTION DRAUGHTS & SECONDS -->
            <container class="container_total">
              <div class="wrapper_spel-min direction">
                <div class="wrapper_spel-min direction">
                  <div class="icon-wrapper clickable">
                    <button
                      id="toggle-translation"
                      class="btn-switch"
                      aria-label="Växla översättning"
                    >
                      <img class="flag icon-md flag-left" />
                      <img class="flag icon-md flag-right" />
                    </button>
                    <span class="tooltip">Visa översättning</span>
                  </div>
                </div>

                <div id="button-mute" class="hit-box justify-center">
                  <img
                    id="sound-icon"
                    class="button--round-md"
                    src="./icons/buttons/button_sound_on.svg"
                    alt="Mute sound for the memory cards"
                  />
                </div>

                <div
                  id="button-pause"
                  class="hit-box justify-center"
                  onclick="pause()"
                >
                  <img
                    id="play-pause"
                    class="button--round-md"
                    src="./icons/buttons/button_pause_default.svg"
                    alt="Play/pause time for the memory game"
                  />
                </div>

                <div class="wrapper_text-min text--uppercase">
                  <span class="info-seconds container-direction"></span
                  ><!-- Sekunder -->
                </div>
              </div>

              <!--             <div class="icon-wrapper clickable">
                <button id="" class="" aria-label="Inställningar">
                  <img
                    id="sound-icon"
                    class="icon_lg"
                    src="./icons/nav/icon_settings_cream.svg"
                    alt="Mute sound for the memory cards"
                  />
                </button>
                <span class="tooltip">Inställningar</span>
              </div>
             --></container
            >
          </section>
        </header>

        <main class="main_card-area">
          <div class="container_game clickable"></div>
        </main>

        <footer>
          <!-- SECTION TOTAL GAMES & MINUTES -->
          <container class="container_total">
            <article class="article_game-info">
              <div class="wrapper_text-min text--uppercase">
                <span class="score container-direction"></span> Drag
              </div>
            </article>

            <div class="wrapper_total-stars_horizontal"></div>
          </container>
        </footer>
      </div>
    </div>

    <!--    
    <popup-wrapper id="appModal">         
      <game-end-finished id="endGameFinishedModal"></game-end-finished>
      <game-end-modal id="endGameModal"></game-end-modal>
    </popup-wrapper> -->

    <!-- POPUP EXIT GAME-->
    <div id="popUpId" class="popup_bg">
      <!--       <div class="popup_styling">
 -->
     <section class="popup">
      <div class="modal-section">
        <div class="nav-toggle">
          <div class="hit-box justify-end clickable">
            <img
              class="button_close"
              src="./icons/nav/close.svg"
              alt="close dialog box to return to game"
            />
          </div>
        </div>

        <div class="modal-content">
          <h2 class="text-headline-md">Vill du avsluta spelet?</h2>

          <div class="wrapper-buttons">
            <a href="menu.html"
              ><div
                class="button button--rect-lg button--full button--danger"
                id="goBackButton"
              >
                <span class="button_label">Avsluta</span>
              </div></a
            >
            <a class="button_close"
              ><div class="button button--rect-lg button--full button--primary">
                <span class="button_label">Fortsätt spela</span>
              </div></a
              >
            </div>
        </div>
      </div>
    </div>
    </section>

    <!-- POPUP GAME ENDS-->

    <div class="popup_bg section_end-game">
      <div class="lottie-container"></div>

    <section class="popup">

      <div class="modal-section">
        <div class="modal-content">
          <div class="wrapper_h2-text">
            <h2 class="text-headline-md" id="popupText">Bra gjort!</h2>
            <div class="p-gap">
              <p>
                Du klarade spelet med <span class="score"></span> drag på
                <span class="info-seconds"></span> sekunder
              </p>
            </div>
          </div>

          <div class="wrapper-buttons">
            <button
              class="button button--rect-lg button--full button--primary"
              onclick="restartGame()"
            >
  <!--             <img src="/docs/icons/buttons/play_again.svg" alt="" />
  -->            <span class="button_label">Spela igen</span>
            </button>
            <button
              class="button button--rect-lg button--full button--danger"
              onclick="window.location.href = 'menu.html'"
            >
  <!--             <img src="/docs/icons/nav/icon_home_black.svg" alt="" />
  -->            <span class="button_label">Huvudmeny</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    </div>

    <!-- 
    <game-exit-modal></game-exit-modal>
    <game-finished-modal></game-finished-modal>
 -->
    <script type="module" src="js/components.js"></script>

    <script src="js/common.js" defer></script>
    <script src="js/pages/game.js" defer></script>
    <script src="js/pages/settings.js" defer></script>

    <!-- <script src="js/components/language-selector.js" type="module"></script>
    <script src="js/components/board-selector.js" defer></script> -->
  </body>
</html>
